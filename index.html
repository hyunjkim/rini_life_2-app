.wrap {
  max-width: 760px;
  margin: 0 auto;
  padding: 20px 14px 34px;
}
.brand {
  text-align:center;
  font-size: 34px;
  font-weight: 800;
  letter-spacing: -0.05em;
  margin: 0 0 12px;
}
.card {
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.55);
  border-radius: 26px;
  padding: 16px 14px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  margin-bottom: 14px;
}
.mom-card { cursor:pointer; }
.eyebrow {
  display:flex; align-items:center; gap:8px;
  color: var(--muted); font-size:13px; font-weight:800;
  margin-bottom:10px;
}
.icon {
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  background: rgba(255,255,255,0.42);
  border:1px solid rgba(120,136,148,0.12);
  flex:0 0 auto;
}
.message {
  font-size:24px; line-height:1.42; letter-spacing:-0.05em; font-weight:800;
  margin:0;
}
.source {
  margin-top:8px; min-height:18px; color:var(--muted); font-size:14px; font-weight:700;
}
.now {
  display:inline-block; margin-top:10px;
  padding:8px 12px; border-radius:999px;
  background: rgba(255,255,255,0.38);
  border:1px solid rgba(120,136,148,0.12);
  color: var(--muted); font-size:12px; font-weight:800;
}
.header-center { text-align:center; margin-bottom: 8px; }
.title {
  display:flex; align-items:center; gap:10px;
  font-size:22px; font-weight:800; letter-spacing:-0.04em;
  margin-bottom:12px;
}
.sub {

function pad(n) { return String(n).padStart(2, "0"); }

function setNow() {
  const d = new Date();
  document.getElementById("nowText").textContent =
    `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} 기준`;
}

let currentQuote = -1;
function newQuote() {
  let idx = Math.floor(Math.random() * QUOTES.length);
  while (QUOTES.length > 1 && idx === currentQuote) idx = Math.floor(Math.random() * QUOTES.length);
  currentQuote = idx;
  const [text, source] = QUOTES[idx];
  document.getElementById("quoteText").textContent = `“${text}”`;
  document.getElementById("quoteSource").textContent = source ? `— ${source}` : "";
}
document.getElementById("momCard").addEventListener("click", newQuote);

function weatherText(code) {
  if ([0].includes(code)) return "맑음";
  if ([1,2].includes(code)) return "구름";
  if ([3].includes(code)) return "흐림";
  if ([51,53,55,56,57].includes(code)) return "이슬비";
  if ([61,63,65,66,67,80,81,82].includes(code)) return "비";
  return "흐림";
}
function weatherIcon(text) {
  if (text.includes("비")) return "🌧️";
  if (text.includes("맑음")) return "☀️";
  if (text.includes("구름")) return "⛅";
  return "☁️";
}
async function loadWeather() {
  const el = document.getElementById("weatherGrid");
  try {
    const url = "https://api.open-meteo.com/v1/forecast?latitude=36.6103&longitude=127.2872&hourly=temperature_2m,precipitation_probability,weather_code&timezone=Asia%2FSeoul&forecast_days=2";
    const res = await fetch(url);
    const data = await res.json();
    const now = new Date();
    const items = data.hourly.time.map((t, i) => {
      const dt = new Date(t);
      return {
        dt,
        text: weatherText(data.hourly.weather_code[i]),
        temp: Math.round(data.hourly.temperature_2m[i]),
        pop: data.hourly.precipitation_probability[i]
      };
    }).filter(v => v.dt >= now).slice(0, 4);

    el.innerHTML = items.map(v => `
      <div class="weather-item">
        <div class="weather-time">${pad(v.dt.getHours())}시</div>
        <div class="weather-main">${weatherIcon(v.text)} ${v.text}</div>
        <div class="weather-side">${v.temp}°C · ${v.pop}%</div>
      </div>
    `).join("");
  } catch (e) {
    el.innerHTML = `
      <div class="weather-item"><div class="weather-time">안내</div><div class="weather-main">로드 실패</div><div class="weather-side">잠시 후 다시</div></div>
      <div class="weather-item"></div><div class="weather-item"></div><div class="weather-item"></div>
    `;
  }
}

function getDayType() {
  if (state.dayType !== "today") return state.dayType;
  const day = new Date().getDay();
  return (day === 0 || day === 6) ? "holiday" : "weekday";
}

function toMin(t) {
  const [h,m] = t.split(":").map(Number);
  return h * 60 + m;
}
function nowMin() {
  const d = new Date();
  return d.getHours() * 60 + d.getMinutes();
}
function next3(times) {
  const now = nowMin();
  const future = times.filter(t => toMin(t) >= now).slice(0,3);
  return future;
}
function routeTimes(route) {
  if (route.id === "1000") {
    const day = getDayType();
    return route.times[day][state.direction] || [];
  }
  return route.times.all[state.direction] || [];
}
function badgeClass(type) {
  if (type === "direct") return "direct";
  if (type === "brt") return "brt";
  return "link";
}

function renderRoutes() {
  const wrap = document.getElementById("routeList");
  const rows = ROUTES.filter(r => state.filter === "all" ? true : r.type === state.filter);

  wrap.innerHTML = rows.map(route => {
    const times = routeTimes(route);
    const upcoming = next3(times);
    const first = times[0] || "—";
    const last = times[times.length - 1] || "—";
    const fullId = `full_${route.id}`;
    return `
      <div class="route">
        <div class="route-top">
          <div>
            <div class="route-name">${route.name}</div>
            <div class="route-desc">${route.desc[state.direction]}</div>
          </div>
          <div class="badges">
            <div class="badge ${badgeClass(route.type)}">${route.badge}</div>
          </div>
        </div>

        <div class="times">
          <div class="tbox">
            <div class="tlabel">다음</div>
            <div class="tvalue">${upcoming[0] || "종료"}</div>
          </div>
          <div class="tbox">
            <div class="tlabel">그다음</div>
            <div class="tvalue">${upcoming[1] || "—"}</div>
          </div>
          <div class="tbox">
            <div class="tlabel">세 번째</div>
            <div class="tvalue">${upcoming[2] || "—"}</div>
          </div>
        </div>

        <div class="meta">
          <div class="chip">첫차 ${first}</div>
          <div class="chip">막차 ${last}</div>
          <div class="chip">${route.duration}</div>
          <div class="chip">${route.transfers}</div>
        </div>

        <button type="button" class="mini" onclick="toggleFull('${fullId}', this)">전체 시간표 보기</button>
        <div class="full" id="${fullId}">${times.join(" · ") || "표시할 시간이 없음"}</div>
      </div>
    `;
  }).join("");
}

function toggleFull(id, btn) {
  const el = document.getElementById(id);
  const isOpen = el.style.display === "block";
  el.style.display = isOpen ? "none" : "block";
  btn.textContent = isOpen ? "전체 시간표 보기" : "시간표 접기";
}

document.querySelectorAll("[data-group]").forEach(btn => {
  btn.addEventListener("click", () => {
    const group = btn.dataset.group;
    const value = btn.dataset.value;
    state[group] = value;
    document.querySelectorAll(`[data-group="${group}"]`).forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderRoutes();
  });
});

setNow();
newQuote();
loadWeather();
renderRoutes();
setInterval(setNow, 30000);
</script>
